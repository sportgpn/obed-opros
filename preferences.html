<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опрос вкусовых предпочтений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header .welcome {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            font-size: 15px;
            line-height: 1.5;
        }

        .form-content {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #1e3c72;
            font-size: 15px;
        }

        .required {
            color: #e74c3c;
            margin-left: 4px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2a5298;
            background: white;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-option input {
            width: auto;
            margin: 0;
        }

        .radio-option label {
            margin: 0;
            font-weight: normal;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(30, 60, 114, 0.3);
        }

        button:disabled {
            background: #ccc;
            transform: none;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 10px;
            display: none;
            font-weight: 500;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .success-permanent {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .form-content {
                padding: 25px;
            }

            .header h1 {
                font-size: 22px;
            }
            
            .radio-group {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🍽️ Опрос вкусовых предпочтений</h1>
            <div class="welcome">
                👋 Привет! Помогите нам сделать корпоративное питание лучше. Расскажите о ваших вкусовых предпочтениях — это займет всего 2-3 минуты.
            </div>
        </div>

        <div class="form-content">
            <form id="preferencesForm">
                <div class="form-group">
                    <label>Регион <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option"><input type="radio" name="region" id="regionCenter" value="Центр"><label for="regionCenter">Центр</label></div>
                        <div class="radio-option"><input type="radio" name="region" id="regionUral" value="Урал"><label for="regionUral">Урал</label></div>
                        <div class="radio-option"><input type="radio" name="region" id="regionSiberia" value="Сибирь"><label for="regionSiberia">Сибирь</label></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Пол <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option"><input type="radio" name="gender" id="genderMale" value="Мужчина"><label for="genderMale">Мужчина</label></div>
                        <div class="radio-option"><input type="radio" name="gender" id="genderFemale" value="Женщина"><label for="genderFemale">Женщина</label></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Основное место работы <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option"><input type="radio" name="workplace" id="workplaceProduction" value="Производство"><label for="workplaceProduction">Производство</label></div>
                        <div class="radio-option"><input type="radio" name="workplace" id="workplaceOffice" value="Офис"><label for="workplaceOffice">Офис</label></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Какой тип салатов предпочитаете? <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option"><input type="radio" name="saladType" id="salad1" value="Легкие овощные из свежих овощей"><label for="salad1">Легкие овощные из свежих овощей (салат из помидор и огурцов)</label></div>
                        <div class="radio-option"><input type="radio" name="saladType" id="salad2" value="Салаты с майонезом"><label for="salad2">Салаты с майонезом (оливье)</label></div>
                        <div class="radio-option"><input type="radio" name="saladType" id="salad3" value="Салаты с рыбой или морепродуктами"><label for="salad3">Салаты с рыбные или морепродуктами</label></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Что для вас важнее в салате? <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option"><input type="radio" name="saladPriority" id="priority1" value="Сытность"><label for="priority1">Сытность</label></div>
                        <div class="radio-option"><input type="radio" name="saladPriority" id="priority2" value="Свежесть и легкость"><label for="priority2">Свежесть и легкость</label></div>
                        <div class="radio-option"><input type="radio" name="saladPriority" id="priority3" value="Оригинальность ингредиентов"><label for="priority3">Оригинальность ингредиентов</label></div>
                        <div class="radio-option"><input type="radio" name="saladPriority" id="priority4" value="Знакомый классический вкус"><label for="priority4">Знакомый классический вкус</label></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Какое первое блюдо по наваристости предпочитаете? <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option"><input type="radio" name="soupRichness" id="richness1" value="Наваристые и густые"><label for="richness1">Наваристые и густые</label></div>
                        <div class="radio-option"><input type="radio" name="soupRichness" id="richness2" value="Легкие бульоны"><label for="richness2">Легкие бульоны</label></div>
                        <div class="radio-option"><input type="radio" name="soupRichness" id="richness3" value="Суп-пюре"><label for="richness3">Суп-пюре</label></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Какое первое блюдо предпочитаете? <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option"><input type="radio" name="soupType" id="soupType1" value="Мясное (борщ, щи)"><label for="soupType1">Мясное (борщ, щи)</label></div>
                        <div class="radio-option"><input type="radio" name="soupType" id="soupType2" value="Рыбное (уха)"><label for="soupType2">Рыбное (уха)</label></div>
                        <div class="radio-option"><input type="radio" name="soupType" id="soupType3" value="Куриное (куриный суп с лапшой)"><label for="soupType3">Куриное (куриный суп с лапшой)</label></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Какой гарнир вы чаще всего выбираете? <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option"><input type="radio" name="sideDish" id="side1" value="Крупы (рис, гречка, булгур)"><label for="side1">Крупы (рис, гречка, булгур)</label></div>
                        <div class="radio-option"><input type="radio" name="sideDish" id="side2" value="Картофель"><label for="side2">Картофель</label></div>
                        <div class="radio-option"><input type="radio" name="sideDish" id="side3" value="Макароны"><label for="side3">Макароны</label></div>
                        <div class="radio-option"><input type="radio" name="sideDish" id="side4" value="Бобовые"><label for="side4">Бобовые</label></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Что выберете из предложенного? <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option"><input type="radio" name="mainDish" id="main1" value="Гуляш из говядины"><label for="main1">Гуляш из говядины</label></div>
                        <div class="radio-option"><input type="radio" name="mainDish" id="main2" value="Куриный шницель"><label for="main2">Куриный шницель</label></div>
                        <div class="radio-option"><input type="radio" name="mainDish" id="main3" value="Рыба запеченая"><label for="main3">Рыба запеченая</label></div>
                        <div class="radio-option"><input type="radio" name="mainDish" id="main4" value="Печень по-строгановски"><label for="main4">Печень по-строгановски</label></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Выберите выпечку, которая пришлась бы вам по вкусу? <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option"><input type="radio" name="bakery" id="bakery1" value="Сладкая с начинкой (булочка с повидлом)"><label for="bakery1">Сладкая с начинкой (булочка с повидлом)</label></div>
                        <div class="radio-option"><input type="radio" name="bakery" id="bakery2" value="Несладкая (с мясом, картофелем, капустой)"><label for="bakery2">Несладкая (с мясом, картофелем, капустой)</label></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Я люблю <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option"><input type="radio" name="spiciness" id="spicy1" value="Острую пищу"><label for="spicy1">Острую пищу</label></div>
                        <div class="radio-option"><input type="radio" name="spiciness" id="spicy2" value="Нейтральные вкусы"><label for="spicy2">Нейтральные вкусы</label></div>
                        <div class="radio-option"><input type="radio" name="spiciness" id="spicy3" value="Умеренный вкус, чтобы самому добавить специи"><label for="spicy3">Умеренный вкус, чтобы самому добавить специи</label></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Ваш комментарий (пожелания, дополнительные предпочтения)</label>
                    <textarea id="comment" rows="4" placeholder="Расскажите подробнее о ваших предпочтениях, любимых блюдах или пожеланиях..."></textarea>
                </div>

                <!-- Контейнер для невидимой капчи -->
                <div id="captcha-container" style="position: absolute; visibility: hidden;"></div>

                <button type="button" id="submitBtn">📨 Отправить ответы</button>
            </form>

            <div id="status"></div>
            <div id="successMessage" style="display: none;"></div>
        </div>
    </div>

    <script src="https://smartcaptcha.yandexcloud.net/captcha.js?render=onload&onload=onloadSmartCaptcha" defer></script>
    <script>
        let captchaWidgetId = null;
        let captchaToken = '';
        let isFormSubmitting = false;

        function onloadSmartCaptcha() {
            if (!window.smartCaptcha) return;
            const container = document.getElementById('captcha-container');
            captchaWidgetId = window.smartCaptcha.render(container, {
                sitekey: 'ysc1_rfOeubnmapuuNE4lVXQzugg4YJN8uSICvmVSkWhk0bca7dba',
                invisible: true,
                callback: function(token) {
                    captchaToken = token;
                    if (!isFormSubmitting) {
                        isFormSubmitting = true;
                        submitFormToServer();
                    }
                }
            });
        }

        function handleFormSubmit(event) {
            event.preventDefault();
            if (isFormSubmitting) return;
            if (!window.smartCaptcha || captchaWidgetId === null) {
                showTemporaryStatus('❌ Ошибка загрузки капчи, попробуйте позже', 'error');
                return;
            }
            if (!validateRequiredFields()) return;
            window.smartCaptcha.execute(captchaWidgetId);
        }

        function validateRequiredFields() {
            const region = document.querySelector('input[name="region"]:checked');
            const gender = document.querySelector('input[name="gender"]:checked');
            const workplace = document.querySelector('input[name="workplace"]:checked');
            const saladType = document.querySelector('input[name="saladType"]:checked');
            const saladPriority = document.querySelector('input[name="saladPriority"]:checked');
            const soupRichness = document.querySelector('input[name="soupRichness"]:checked');
            const soupType = document.querySelector('input[name="soupType"]:checked');
            const sideDish = document.querySelector('input[name="sideDish"]:checked');
            const mainDish = document.querySelector('input[name="mainDish"]:checked');
            const bakery = document.querySelector('input[name="bakery"]:checked');
            const spiciness = document.querySelector('input[name="spiciness"]:checked');

            if (!region || !gender || !workplace || !saladType || !saladPriority || !soupRichness || 
                !soupType || !sideDish || !mainDish || !bakery || !spiciness) {
                showTemporaryStatus('❌ Пожалуйста, ответьте на все вопросы', 'error');
                return false;
            }
            return true;
        }

        function showTemporaryStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = type;
            statusDiv.style.display = 'block';
            setTimeout(() => {
                if (statusDiv.style.display !== 'none') {
                    statusDiv.style.display = 'none';
                }
            }, 5000);
        }

        function showPermanentSuccess(message, reviewNumber) {
            const successDiv = document.getElementById('successMessage');
            successDiv.innerHTML = `
                <div class="success-permanent">
                    ✅ ${message}<br>
                    <strong style="font-size: 18px;">Ваш номер ответа: ${reviewNumber}</strong><br>
                    <small style="display: block; margin-top: 8px;">Спасибо за участие в опросе! Страницу можно обновить для нового ответа.</small>
                </div>
            `;
            successDiv.style.display = 'block';
            document.getElementById('status').style.display = 'none';
        }

        const form = document.getElementById('preferencesForm');
        const submitBtn = document.getElementById('submitBtn');

        async function submitFormToServer() {
            try {
                const region = document.querySelector('input[name="region"]:checked').value;
                const gender = document.querySelector('input[name="gender"]:checked').value;
                const workplace = document.querySelector('input[name="workplace"]:checked').value;
                const saladType = document.querySelector('input[name="saladType"]:checked').value;
                const saladPriority = document.querySelector('input[name="saladPriority"]:checked').value;
                const soupRichness = document.querySelector('input[name="soupRichness"]:checked').value;
                const soupType = document.querySelector('input[name="soupType"]:checked').value;
                const sideDish = document.querySelector('input[name="sideDish"]:checked').value;
                const mainDish = document.querySelector('input[name="mainDish"]:checked').value;
                const bakery = document.querySelector('input[name="bakery"]:checked').value;
                const spiciness = document.querySelector('input[name="spiciness"]:checked').value;
                const comment = document.getElementById('comment').value.trim();

                const payload = {
                    region,
                    gender,
                    workplace,
                    saladType,
                    saladPriority,
                    soupRichness,
                    soupType,
                    sideDish,
                    mainDish,
                    bakery,
                    spiciness,
                    comment: comment || '',
                    captchaToken: captchaToken
                };

                showTemporaryStatus('📡 Отправка данных...', 'info');

                const response = await fetch('https://d5d73semn2nofcs91jio.trruwy79.apigw.yandexcloud.net/preferences', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    const reviewNumber = result.reviewNumber || '—';
                    showPermanentSuccess('Спасибо! Ваши ответы успешно сохранены', reviewNumber);
                    form.reset();
                    submitBtn.disabled = true;
                    submitBtn.textContent = '✓ Отправлено';
                    captchaToken = '';
                    if (window.smartCaptcha && captchaWidgetId !== null) {
                        window.smartCaptcha.reset(captchaWidgetId);
                    }
                } else {
                    showTemporaryStatus(`❌ Ошибка: ${result.error || 'Не удалось отправить ответы'}`, 'error');
                    if (result.error === 'Captcha verification failed') {
                        captchaToken = '';
                        if (window.smartCaptcha && captchaWidgetId !== null) {
                            window.smartCaptcha.reset(captchaWidgetId);
                        }
                    }
                    isFormSubmitting = false;
                    submitBtn.disabled = false;
                    submitBtn.textContent = '📨 Отправить ответы';
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showTemporaryStatus('❌ Ошибка соединения. Проверьте интернет и попробуйте снова', 'error');
                isFormSubmitting = false;
                submitBtn.disabled = false;
                submitBtn.textContent = '📨 Отправить ответы';
            }
        }

        submitBtn.addEventListener('click', handleFormSubmit);
    </script>
</body>

</html>
